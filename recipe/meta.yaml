{% set name = "empix" %}
{% set version = "0.0.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/empix-{{ version }}.tar.gz
  sha256: d69216a806e67431c17a0ec841167152e44968933180af0e5e4faab519b6ba5b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools
    - wheel
    - setuptools-scm
    - pip
  run:
    - python >=3.8
    - czekitout
    - fancytypes >=1.0.0
    - hyperspy
    - pyfai

test:
  imports:
    - empix
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://pypi.org/project/empix/
  summary: Contains tools for analyzing electron microscopy data that are not available in ``hyperspy``.
  dev_url: https://github.com/mrfitzpa/empix
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - mrfitzpa
